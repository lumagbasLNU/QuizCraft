<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Quiz - QuizCraft</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .smart-review-card {
            background-color: #1a1f24;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .wrong-answer-text {
            color: #ff4d4f;
            text-decoration: line-through;
        }
        .correct-concept {
            color: #00FFF6;
        }
        .ai-explanation {
            margin-top: 10px;
            color: #bbb;
            font-style: italic;
        }
        .search-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 16px;
            background-color: #2b3036;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .search-btn:hover {
            background-color: #3b4046;
        }
    </style>
</head>
<body class="dashboard-body">

    <div id="navbar-container"></div>

    <main class="dashboard-main-full">
        
        <!-- Loading UI -->
        <div id="loading-ui" style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column;">
            <h2 id="loading-text" style="color: #00FFF6;">Loading Quiz...</h2>
        </div>

        <!-- Quiz UI -->
        <div class="quiz-take-fullscreen" id="quiz-ui" style="display: none;">
            
            <header class="qt-header">
                <div class="qt-header-left">
                    <button class="btn-back-icon" id="btn-exit" aria-label="Exit Quiz">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#00FFF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px;">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 8 8 12 12 16"></polyline>
                        </svg>
                    </button>
                    <h1 id="qt-title">Loading...</h1>
                </div>
                <div class="qt-header-right">
                    <p>Creator: <span class="highlight" id="qt-creator">...</span></p>
                </div>
            </header>

            <hr class="qt-divider">

            <div class="qt-content-area">
                <h2 id="qt-question-text">Loading question...</h2>
                <p class="qt-subtext" id="qt-subtext"></p>

                <div id="qt-dynamic-input-area"></div>
            </div>

            <hr class="qt-divider">
            
            <footer class="qt-footer-full">
                <div class="qt-footer-left"></div>
                
                <div class="qt-progress-wrapper-full">
                    <div class="qt-progress-bar-bg">
                        <div class="qt-progress-bar-fill" id="qt-progress-fill"></div>
                    </div>
                    <span class="qt-progress-text" id="qt-progress-text">0 / 0</span>
                </div>
                
                <div class="qt-footer-right">
                    <button class="btn-secondary" id="btn-prev">Previous</button>
                    <button class="btn-primary" id="btn-next">Next</button>
                </div>
            </footer>
        </div>

        <!-- Results UI -->
        <div class="quiz-take-fullscreen" id="results-ui" style="display: none; padding: 40px; overflow-y: auto;">
            <div style="text-align: center; margin-bottom: 40px;">
                <h1 style="font-size: 3rem; color: #00FFF6;">Quiz Complete!</h1>
                <h2 id="score-text" style="font-size: 2rem; margin-top: 10px;">You scored 0 out of 0</h2>
                <div id="results-btn-row" style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
                    <button class="btn-primary" onclick="window.location.href='/dashboard'" style="min-width: 220px;">Return to Dashboard</button>
                </div>
            </div>
            
            <div id="smart-review-container" style="max-width: 800px; margin: 0 auto;">
                <h3 style="margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;">Smart Review (AI Feedback)</h3>
                <div id="smart-review-cards"></div>
            </div>
        </div>
        
        <div class="modal-overlay" id="exit-modal-overlay" style="display: none;">
            <div class="cancel-modal"> <h2 class="cancel-modal-title">Are you sure you want to stop the quiz?</h2>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn" id="btn-confirm-exit">Yes</button>
                    <button type="button" class="modal-btn" id="btn-close-exit">No</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/take_quiz.js"></script>
</body>
</html>
